<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DJB-M-SU-_ 3D Tiles</title>
  <script>
    window.CESIUM_BASE_URL = "../Cesium-1.141/Build/Cesium/";
  </script>
  <link rel="stylesheet" href="../Cesium-1.141/Build/Cesium/Widgets/widgets.css">
  <script src="../Cesium-1.141/Build/Cesium/Cesium.js"></script>
  <style>
    :root {
      --item-panel-outer-width: 362px;
      --night-dim-opacity: 0;
    }

    html,
    body,
    #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #bfdde7;
      font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
    }

    .night-dimmer {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      background: rgba(2, 6, 23, var(--night-dim-opacity));
      transition: background 0.18s ease;
    }

    .tool-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      display: grid;
      gap: 8px;
      align-items: start;
      width: min(1120px, calc(100vw - 380px));
      padding: 8px;
      color: #f8fafc;
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(8px);
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .settings-tools {
      align-items: stretch;
    }

    .tool-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
      padding: 4px;
      background: rgba(15, 23, 42, 0.42);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 6px;
    }

    .tool-button {
      min-width: 54px;
      height: 30px;
      padding: 0 10px;
      color: #e5e7eb;
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.44);
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
    }

    .tool-button:hover,
    .tool-button.active {
      color: #ffffff;
      background: #2563eb;
      border-color: #60a5fa;
    }

    .tool-button[aria-pressed="true"] {
      color: #ffffff;
      background: #16a34a;
      border-color: #86efac;
    }

    .basemap-control,
    .material-control,
    .normal-control,
    .time-control,
    .render-scale-control,
    .explode-control,
    .move-control {
      display: grid;
      grid-template-columns: auto minmax(120px, 220px) 44px;
      gap: 8px;
      align-items: center;
      min-height: 30px;
      padding: 0 8px;
      color: #e5e7eb;
      background: rgba(15, 23, 42, 0.58);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 5px;
      font-size: 13px;
    }

    .auto-render-control,
    .scene-toggle-control {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      min-height: 30px;
      padding: 0 8px;
      color: #e5e7eb;
      background: rgba(15, 23, 42, 0.58);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 5px;
      font-size: 13px;
      white-space: nowrap;
    }

    .auto-render-control input,
    .scene-toggle-control input {
      width: 14px;
      height: 14px;
      accent-color: #60a5fa;
    }

    .visual-tools-row-break {
      flex-basis: 100%;
      width: 0;
      height: 0;
    }

    .time-dock {
      position: absolute;
      left: 50%;
      bottom: 12px;
      z-index: 20;
      transform: translateX(-50%);
      pointer-events: auto;
    }

    .time-dock .time-control {
      width: clamp(320px, 34vw, 460px);
      grid-template-columns: auto minmax(180px, 1fr) 48px;
    }

    .basemap-control,
    .material-control {
      grid-template-columns: auto minmax(120px, 170px);
    }

    .basemap-control select,
    .material-control select {
      width: 100%;
      height: 26px;
      color: #e5e7eb;
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.44);
      border-radius: 5px;
      font-size: 13px;
    }

    .normal-control input,
    .time-control input,
    .render-scale-control input,
    .explode-control input,
    .move-control input {
      width: 100%;
      accent-color: #60a5fa;
    }

    .normal-value,
    .time-value,
    .render-scale-value,
    .explode-value,
    .move-value {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .move-pad {
      display: grid;
      grid-template-columns: repeat(3, 24px);
      grid-template-rows: repeat(3, 24px);
      gap: 3px;
      padding: 4px;
      background: rgba(15, 23, 42, 0.58);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 50%;
    }

    .move-pad button {
      width: 24px;
      height: 24px;
      padding: 0;
      color: #cbd5e1;
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 50%;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
    }

    .move-pad button:hover,
    .move-pad button.active {
      color: #ffffff;
      background: #2563eb;
      border-color: #93c5fd;
    }

    .move-pad .move-center {
      color: #f8fafc;
      background: rgba(22, 163, 74, 0.8);
      border-color: rgba(134, 239, 172, 0.82);
      font-size: 11px;
      font-weight: 700;
    }

    .status,
    .measure-result {
      position: absolute;
      z-index: 10;
      max-width: min(560px, calc(100vw - 24px));
      padding: 8px 10px;
      color: #e5e7eb;
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      pointer-events: none;
    }

    .status {
      left: 12px;
      bottom: 12px;
    }

    .measure-result {
      right: 12px;
      bottom: 12px;
      min-width: 210px;
      text-align: right;
    }

    .cesium-infoBox {
      right: calc(var(--item-panel-outer-width) + 24px) !important;
      width: min(460px, calc(100vw - 410px)) !important;
      max-width: none;
    }

    .feature-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .feature-table th,
    .feature-table td {
      padding: 5px 7px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      text-align: left;
      vertical-align: top;
      word-break: break-word;
    }

    .feature-table th {
      width: 34%;
      color: #d1d5db;
      font-weight: 600;
    }

    .item-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 22;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 8px;
      width: 340px;
      max-height: calc(100vh - 24px);
      padding: 10px;
      color: #f8fafc;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(8px);
    }

    .item-panel-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }

    .item-panel-title {
      font-size: 14px;
      font-weight: 700;
    }

    .item-summary {
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.35;
    }

    .item-search {
      width: 100%;
      height: 30px;
      min-width: 0;
      padding: 0 9px;
      color: #e5e7eb;
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.44);
      border-radius: 5px;
      font-size: 13px;
      box-sizing: border-box;
    }

    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .item-action-button {
      height: 28px;
      padding: 0 9px;
      color: #e5e7eb;
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.44);
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
    }

    .item-action-button:hover {
      color: #ffffff;
      background: #2563eb;
      border-color: #60a5fa;
    }

    .item-list {
      display: grid;
      gap: 6px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .item-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      color: #e5e7eb;
      background: rgba(15, 23, 42, 0.58);
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 5px;
    }

    .item-row.located {
      border-color: rgba(34, 211, 238, 0.8);
      background: rgba(8, 47, 73, 0.62);
    }

    .item-row.model-focused {
      outline: 2px solid rgba(167, 139, 250, 0.9);
      outline-offset: 2px;
    }

    .item-row-main {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      min-width: 0;
      cursor: pointer;
    }

    .item-row-main input {
      width: 14px;
      height: 14px;
      margin: 2px 0 0;
      accent-color: #facc15;
    }

    .item-row:has(input:checked) {
      border-color: rgba(250, 204, 21, 0.72);
      background: rgba(113, 63, 18, 0.58);
    }

    .item-locate-button {
      height: 28px;
      min-width: 48px;
      padding: 0 8px;
      color: #e0f2fe;
      background: rgba(14, 116, 144, 0.78);
      border: 1px solid rgba(103, 232, 249, 0.46);
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .item-locate-button:hover,
    .item-locate-button:focus-visible {
      color: #ffffff;
      background: #0891b2;
      border-color: #67e8f9;
    }

    .item-locate-button:disabled {
      color: #94a3b8;
      background: rgba(30, 41, 59, 0.7);
      border-color: rgba(148, 163, 184, 0.24);
      cursor: not-allowed;
    }

    .item-name {
      display: block;
      color: #f8fafc;
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }

    .item-meta {
      display: block;
      margin-top: 3px;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.35;
    }

    .item-empty {
      padding: 10px;
      color: #cbd5e1;
      background: rgba(15, 23, 42, 0.58);
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 5px;
      font-size: 13px;
    }

    @media (max-width: 720px) {
      .tool-panel {
        right: 12px;
        width: auto;
      }

      .item-panel {
        top: auto;
        left: 12px;
        right: 12px;
        bottom: 88px;
        width: auto;
        max-height: 42vh;
      }

      .cesium-infoBox {
        top: 12px !important;
        left: 12px !important;
        right: 12px !important;
        width: auto !important;
        max-height: 38vh;
      }

      .toolbar-row,
      .tool-group {
        width: 100%;
      }

      .basemap-control,
      .material-control,
      .normal-control,
      .time-control,
      .render-scale-control,
      .explode-control,
      .move-control {
        grid-template-columns: auto minmax(96px, 1fr) 38px;
        width: 100%;
      }

      .measure-result {
        left: 12px;
        right: auto;
        bottom: 54px;
        text-align: left;
      }

      .time-dock {
        left: 12px;
        right: 12px;
        bottom: 96px;
        transform: none;
      }

      .time-dock .time-control {
        width: 100%;
        grid-template-columns: auto minmax(96px, 1fr) 44px;
      }
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="nightDimmer" class="night-dimmer" aria-hidden="true"></div>

  <div id="toolPanel" class="tool-panel" aria-label="3D Tiles 工具列">
    <div class="toolbar-row primary-tools">
      <div class="tool-group mode-tools">
        <button class="tool-button active" type="button" data-mode="select">選取</button>
        <button class="tool-button" type="button" id="focusToggle" aria-pressed="false">焦點 OFF</button>
        <button class="tool-button" type="button" id="undergroundToggle" aria-pressed="true">透地 ON</button>
      </div>
      <div class="tool-group measure-tools">
        <button class="tool-button" type="button" data-mode="distance">量距</button>
        <button class="tool-button" type="button" data-mode="area">量面</button>
        <button class="tool-button" type="button" id="clearMeasureButton">清除</button>
      </div>
      <div class="tool-group basemap-tools">
        <label class="basemap-control">
          <span>底圖</span>
          <select id="basemapSelect" aria-label="底圖選擇">
            <option value="emap5" selected>EMAP5</option>
            <option value="googleRoadmap">Google 街景圖</option>
            <option value="googleSatellite">Google 航照圖</option>
            <option value="osm">OSM</option>
          </select>
        </label>
      </div>
    </div>
    <div class="toolbar-row settings-tools">
      <div class="tool-group visual-tools">
        <label class="normal-control">
          <span>法線</span>
          <input id="normalModeSlider" type="range" min="0" max="2" value="0" step="1">
          <span id="normalModeValue" class="normal-value">平面</span>
        </label>
        <label class="material-control">
          <span>材質</span>
          <select id="materialSelect" aria-label="材質模式">
            <option value="original" selected>原始</option>
            <option value="silver">銀灰金屬</option>
            <option value="dark">深色金屬</option>
            <option value="mirror">高反光測試</option>
          </select>
        </label>
        <label class="render-scale-control">
          <span>畫質</span>
          <input id="renderScaleSlider" type="range" min="0.5" max="1" value="1" step="0.05">
          <span id="renderScaleValue" class="render-scale-value">100%</span>
        </label>
        <label class="auto-render-control">
          <input id="autoRenderScaleToggle" type="checkbox" checked>
          <span>自動</span>
        </label>
        <span class="visual-tools-row-break" aria-hidden="true"></span>
        <label class="scene-toggle-control">
          <input id="sunToggle" type="checkbox" checked>
          <span>太陽</span>
        </label>
        <label class="scene-toggle-control">
          <input id="atmosphereToggle" type="checkbox" checked>
          <span>大氣</span>
        </label>
        <label class="scene-toggle-control">
          <input id="shadowToggle" type="checkbox" checked>
          <span>陰影</span>
        </label>
        <label class="scene-toggle-control">
          <input id="waterToggle" type="checkbox" checked>
          <span>水波</span>
        </label>
      </div>
      <div class="tool-group explode-tools">
        <label class="explode-control">
          <span>爆炸</span>
          <input id="explodeSlider" type="range" min="0" max="100" value="0" step="1">
          <span id="explodeValue" class="explode-value">0%</span>
        </label>
        <button class="tool-button" type="button" id="resetExplodeButton">還原</button>
        <label class="move-control">
          <span>移出</span>
          <input id="moveOutSlider" type="range" min="0" max="100" value="0" step="1">
          <span id="moveOutValue" class="move-value">0%</span>
        </label>
        <div id="movePad" class="move-pad" aria-label="移出方向">
          <button type="button" data-move-direction="nw" aria-label="西北移出" title="西北">↖</button>
          <button type="button" data-move-direction="n" aria-label="向北移出" title="北">↑</button>
          <button type="button" data-move-direction="ne" aria-label="東北移出" title="東北">↗</button>
          <button type="button" data-move-direction="w" aria-label="向西移出" title="西">←</button>
          <button type="button" id="resetMoveOutButton" class="move-center" aria-label="移回原位" title="移回原位">0</button>
          <button type="button" data-move-direction="e" aria-label="向東移出" title="東">→</button>
          <button type="button" data-move-direction="sw" class="active" aria-pressed="true" aria-label="西南移出" title="西南">↙</button>
          <button type="button" data-move-direction="s" aria-label="向南移出" title="南">↓</button>
          <button type="button" data-move-direction="se" aria-label="東南移出" title="東南">↘</button>
        </div>
      </div>
    </div>
  </div>

  <aside id="itemPanel" class="item-panel" aria-label="模型項目列表">
    <div class="item-panel-header">
      <div>
        <div class="item-panel-title">項目列表</div>
        <div id="itemSummary" class="item-summary">Loading metadata...</div>
      </div>
    </div>
    <input id="itemSearch" class="item-search" type="search" placeholder="搜尋項目" aria-label="搜尋項目">
    <div class="item-actions">
      <button id="highlightVisibleItemsButton" class="item-action-button" type="button">全選目前</button>
      <button id="clearItemHighlightsButton" class="item-action-button" type="button">清除高反光</button>
    </div>
    <div id="itemList" class="item-list"></div>
  </aside>

  <div id="timeDock" class="time-dock" aria-label="時間控制">
    <label class="time-control">
      <span>時間</span>
      <input id="timeOfDaySlider" type="range" min="0" max="1439" step="1">
      <span id="timeOfDayValue" class="time-value">--:--</span>
    </label>
  </div>

  <div id="status" class="status">Loading tileset.json...</div>
  <div id="measureResult" class="measure-result">選取模式</div>

  <script src="./config.js"></script>
  <script>
    (async function () {
      const status = document.getElementById("status");
      const measureResult = document.getElementById("measureResult");
      const nightDimmer = document.getElementById("nightDimmer");
      const normalModeSlider = document.getElementById("normalModeSlider");
      const normalModeValue = document.getElementById("normalModeValue");
      const renderScaleSlider = document.getElementById("renderScaleSlider");
      const renderScaleValue = document.getElementById("renderScaleValue");
      const autoRenderScaleToggle = document.getElementById("autoRenderScaleToggle");
      const atmosphereToggle = document.getElementById("atmosphereToggle");
      const sunToggle = document.getElementById("sunToggle");
      const shadowToggle = document.getElementById("shadowToggle");
      const waterToggle = document.getElementById("waterToggle");
      const timeOfDaySlider = document.getElementById("timeOfDaySlider");
      const timeOfDayValue = document.getElementById("timeOfDayValue");
      const explodeSlider = document.getElementById("explodeSlider");
      const explodeValue = document.getElementById("explodeValue");
      const moveOutSlider = document.getElementById("moveOutSlider");
      const moveOutValue = document.getElementById("moveOutValue");
      const movePad = document.getElementById("movePad");
      const focusToggle = document.getElementById("focusToggle");
      const undergroundToggle = document.getElementById("undergroundToggle");
      const basemapSelect = document.getElementById("basemapSelect");
      const materialSelect = document.getElementById("materialSelect");
      const itemSummary = document.getElementById("itemSummary");
      const itemSearch = document.getElementById("itemSearch");
      const itemList = document.getElementById("itemList");
      const highlightVisibleItemsButton = document.getElementById("highlightVisibleItemsButton");
      const clearItemHighlightsButton = document.getElementById("clearItemHighlightsButton");
      const query = new URLSearchParams(location.search);
      const viewerConfig = getViewerConfig("cesium", query);
      const tilesetName = query.get("tileset") || viewerConfig.tileset || "tileset.json";
      const tilesetUrl = "./" + tilesetName.replace(/^\/+/, "");
      const smooth90TilesetUrl = "./tileset_smooth_90.json";
      const smoothTilesetUrl = "./tileset_smooth.json";
      const metadataUrl = "./metadata.json";
      const ifcInfoUrl = "./ifc_info.json";
      const waterNormalMapUrl = "../Cesium-1.141/Build/Cesium/Assets/Textures/waterNormals.jpg";
      const normalModes = [
        { mode: "flat", label: "平面", url: tilesetUrl },
        { mode: "smooth90", label: "90°", url: smooth90TilesetUrl },
        { mode: "smooth", label: "全平滑", url: smoothTilesetUrl }
      ];
      const materialModes = {
        original: {
          label: "原始",
          metallic: 0.0,
          roughness: 1.0,
          tint: [1.0, 1.0, 1.0],
          tintStrength: 0.0,
          brightness: 0.0,
          contrast: 1.0,
          specularBoost: 1.0
        },
        silver: {
          label: "銀灰金屬",
          metallic: 0.92,
          roughness: 0.22,
          tint: [0.78, 0.82, 0.86],
          tintStrength: 0.72,
          brightness: 0.05,
          contrast: 1.12,
          specularBoost: 1.15
        },
        dark: {
          label: "深色金屬",
          metallic: 0.95,
          roughness: 0.18,
          tint: [0.28, 0.31, 0.34],
          tintStrength: 0.82,
          brightness: 0.04,
          contrast: 1.18,
          specularBoost: 1.25
        },
        mirror: {
          label: "高反光測試",
          metallic: 1.0,
          roughness: 0.06,
          tint: [0.90, 0.92, 0.95],
          tintStrength: 0.78,
          brightness: 0.08,
          contrast: 1.22,
          specularBoost: 1.45
        }
      };
      const AUTO_RENDER_SCALE_MOVING = 0.5;
      const AUTO_RENDER_SCALE_RESTORED = 1.0;
      const GLB_CLOSE_VIEW_DEPTH_FACTOR = 2.8;
      const GLB_CLOSE_VIEW_MIN_DISTANCE = 40.0;
      const DEFAULT_CESIUM_BACKGROUND = "#dddddd";
      const DEFAULT_CESIUM_LIGHT_INTENSITY = 3.2;
      const DEFAULT_CESIUM_IMAGE_BASED_LIGHTING = 2.35;
      const DEFAULT_CESIUM_MODEL_LIGHT_BOOST = 1.35;
      const DEFAULT_CESIUM_REFLECTION_BOOST = 0.38;

          return createGoogleImageryProvider("m", "Google 街景圖");

      function createEmap5ImageryProvider() {
        const provider = new Cesium.UrlTemplateImageryProvider({
          url: "https://wmts.nlsc.gov.tw/wmts/EMAP5/default/GoogleMapsCompatible/{z}/{y}/{x}",
          maximumLevel: 19,
          credit: "NLSC EMAP5"
        });
        provider.errorEvent.addEventListener(function (error) {
          error.retry = false;
          if (appState.basemap === "emap5") {
            status.textContent = "EMAP5 WMTS 載入失敗，切回 Google 航照。";
            setBasemap("googleSatellite");
          }
        });
        return provider;
      }

      function createGoogleImageryProvider(layer, credit) {

          subdomains: ["0", "1", "2", "3"],
          maximumLevel: 21,
          credit: credit
        });
        provider.errorEvent.addEventListener(function (error) {

          status.textContent = credit + "載入失敗，已保留 3D Tiles。";

        return provider;

      async function loadItemGroups() {
        try {
          const metadataResponse = await fetch(metadataUrl);

          const features = await metadataResponse.json();

          renderItemGroups();
