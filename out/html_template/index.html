      async function loadItemLocationInfo() {
        try {
          const response = await fetch(ifcInfoUrl);
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }

          const info = await response.json();
          return buildItemInfoByStepId(Array.isArray(info.products) ? info.products : []);
        } catch (error) {
          console.warn("item location info unavailable", error);
          return {};
        }
      }

      function buildItemInfoByStepId(products) {
        const infoByStepId = {};
        products.forEach(function (product) {
          const stepId = Number(product.ifc_step_id);
          if (!isFinite(stepId)) {
            return;
          }

          const center = parseWgs84Point(product.wgs84_center);
          const min = parseWgs84Point(product.wgs84_bounds_min);
          const max = parseWgs84Point(product.wgs84_bounds_max);
          if (!center || !min || !max) {
            return;
          }

          infoByStepId[stepId] = { center: center, min: min, max: max };
        });
        return infoByStepId;
      }

      function parseWgs84Point(value) {
        if (!value) {
          return null;
        }

        const lon = Number(value.lon);
        const lat = Number(value.lat);
        const height = Number(value.height);
        if (!isFinite(lon) || !isFinite(lat)) {
          return null;
        }

        return {
          lon: lon,
          lat: lat,
          height: isFinite(height) ? height : 0
        };
      }

      function buildItemGroups(features, itemInfoByStepId) {
        const groupMap = {};
        features.forEach(function (feature) {
          const stepId = Number(feature.ifc_step_id);
          if (!isFinite(stepId)) {
            return;
          }

          const groupName = getItemGroupName(feature);
          const ifcType = feature.ifc_type || "IFC";
          const key = ifcType + "|" + groupName;
          if (!groupMap[key]) {
          groupMap[key] = {
            key: key,
            name: groupName,
            displayName: formatItemGroupName(groupName),
            ifcType: ifcType,
            count: 0,
            triangleCount: 0,
            stepIds: [],
            batchIds: [],
            locationCount: 0,
            locationSum: { lon: 0, lat: 0, height: 0 },
            locationMin: { lon: Infinity, lat: Infinity, height: Infinity },
              locationMax: { lon: -Infinity, lat: -Infinity, height: -Infinity },
              location: null
            };
          }

          groupMap[key].count += 1;
          groupMap[key].triangleCount += Number(feature.triangle_count) || 0;
          groupMap[key].stepIds.push(stepId);
          if (isFinite(Number(feature.batch_id))) {
            groupMap[key].batchIds.push(Number(feature.batch_id));
          }
          addItemLocationToGroup(groupMap[key], itemInfoByStepId[stepId]);
        });

        return Object.keys(groupMap).map(function (key) {
          return finalizeItemGroupLocation(groupMap[key]);
        }).sort(function (a, b) {
          if (a.ifcType !== b.ifcType) {
            return a.ifcType.localeCompare(b.ifcType, "zh-Hant");
          }
          return a.displayName.localeCompare(b.displayName, "zh-Hant", { numeric: true });
        });
      }

      function addItemLocationToGroup(group, location) {
        if (!location || !location.center || !location.min || !location.max) {
          return;
        }

        group.locationCount += 1;
        group.locationSum.lon += location.center.lon;
        group.locationSum.lat += location.center.lat;
        group.locationSum.height += location.center.height;
        group.locationMin.lon = Math.min(group.locationMin.lon, location.min.lon);
        group.locationMin.lat = Math.min(group.locationMin.lat, location.min.lat);
        group.locationMin.height = Math.min(group.locationMin.height, location.min.height);
        group.locationMax.lon = Math.max(group.locationMax.lon, location.max.lon);
        group.locationMax.lat = Math.max(group.locationMax.lat, location.max.lat);
        group.locationMax.height = Math.max(group.locationMax.height, location.max.height);
      }

      function finalizeItemGroupLocation(group) {
        if (!group.locationCount) {
          delete group.locationCount;
          delete group.locationSum;
          delete group.locationMin;
          delete group.locationMax;
          return group;
        }

        group.location = {
          center: {
            lon: group.locationSum.lon / group.locationCount,
            lat: group.locationSum.lat / group.locationCount,
            height: group.locationSum.height / group.locationCount
          },
          min: group.locationMin,
          max: group.locationMax,
          count: group.locationCount
        };
        group.location.range = getLocationRangeMeters(group.location);
        delete group.locationCount;
        delete group.locationSum;
        delete group.locationMin;
        delete group.locationMax;
        return group;
      }

      function getItemGroupName(feature) {
        const name = feature.name || feature.global_id || "未分類項目";
        const lastColon = name.lastIndexOf(":");
        if (lastColon > 0) {
          return name.slice(0, lastColon);
        }
        return name;
      }

      function formatItemGroupName(name) {
        const parts = String(name).split(":").filter(Boolean);
        if (parts.length === 2 && parts[0] === parts[1]) {
          return parts[0];
        }
        return parts.join(" / ") || "未分類項目";
      }

      function normalizeItemText(value) {
        return String(value || "").toLowerCase();
      }

      function renderItemGroups(options) {
        const preserveScroll = options && options.preserveScroll;
        const previousScrollTop = preserveScroll ? itemList.scrollTop : 0;
        const term = normalizeItemText(itemSearch.value);
        const groups = appState.itemGroups.filter(function (group) {
          if (!term) {
            return true;
          }
          return normalizeItemText(group.displayName + " " + group.name + " " + group.ifcType).includes(term);
        });
        appState.visibleItemGroups = groups;

        itemList.replaceChildren();
        if (!groups.length) {
          itemList.appendChild(createItemEmpty(appState.itemGroups.length ? "沒有符合的項目" : "Loading metadata..."));
        } else {
          groups.forEach(function (group) {
            itemList.appendChild(createItemRow(group));
          });
        }
        if (preserveScroll) {
          const maxScrollTop = Math.max(0, itemList.scrollHeight - itemList.clientHeight);
          itemList.scrollTop = Math.min(previousScrollTop, maxScrollTop);
        }

        const highlightedCount = appState.highlightedGroupKeys.size;
        const featureCount = appState.itemGroups.reduce(function (sum, group) {
          return sum + group.count;
        }, 0);
        itemSummary.textContent = appState.itemGroups.length + " 組 / " + featureCount + " 件" +
          (highlightedCount ? " · 高反光 " + highlightedCount + " 組" : "");
      }

      function createItemEmpty(text) {
        const empty = document.createElement("div");
        empty.className = "item-empty";
        empty.textContent = text;
        return empty;
      }

      function createItemRow(group) {
        const row = document.createElement("div");
        row.className = "item-row" +
          (appState.locatedGroupKey === group.key ? " located" : "") +
          (appState.focusedGroupKey === group.key ? " model-focused" : "");
        row.dataset.groupKey = group.key;
        row.tabIndex = -1;

        const label = document.createElement("label");
        label.className = "item-row-main";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.dataset.groupKey = group.key;
        checkbox.checked = appState.highlightedGroupKeys.has(group.key);

        const body = document.createElement("span");
        const name = document.createElement("span");
        name.className = "item-name";
        name.textContent = group.displayName;

        const meta = document.createElement("span");
        meta.className = "item-meta";
        meta.textContent = group.ifcType + " · " + group.count + " 件" +
          (group.triangleCount > 0 ? " · " + formatCount(group.triangleCount) + " triangles" : "");

        body.appendChild(name);
        body.appendChild(meta);
        label.appendChild(checkbox);
        label.appendChild(body);

        const locateButton = document.createElement("button");
        locateButton.type = "button";
        locateButton.className = "item-locate-button";
        locateButton.dataset.groupKey = group.key;
        locateButton.textContent = "定位";
        locateButton.title = group.location ? "定位到 " + group.displayName : "沒有定位資訊";
        locateButton.disabled = !group.location;

        row.appendChild(label);
        row.appendChild(locateButton);
        return row;
      }

      function formatCount(value) {
        return Math.round(Number(value) || 0).toLocaleString("en-US");
      }

      function setItemGroupHighlighted(groupKey, highlighted) {
        if (highlighted) {
          appState.highlightedGroupKeys.add(groupKey);
        } else {
          appState.highlightedGroupKeys.delete(groupKey);
        }
        rebuildHighlightedStepIds();
        renderItemGroups({ preserveScroll: true });
        applyItemMaterialHighlights();
      }

      function rebuildHighlightedStepIds() {
        appState.highlightedStepIds = new Set();
        appState.itemGroups.forEach(function (group) {
          if (!appState.highlightedGroupKeys.has(group.key)) {
            return;
          }
          group.stepIds.forEach(function (stepId) {
            appState.highlightedStepIds.add(stepId);
          });
        });
      }

      function focusItemGroupForFeature(feature) {
        const stepId = getFeatureStepId(feature);
        if (!isFinite(stepId)) {
          return;
        }

        const group = findItemGroupByStepId(stepId);
        if (!group) {
          return;
        }

        appState.focusedGroupKey = group.key;
        if (!appState.visibleItemGroups.some(function (visibleGroup) {
          return visibleGroup.key === group.key;
        })) {
          itemSearch.value = "";
        }
        renderItemGroups();
        scrollFocusedItemGroupIntoView(group.key);
      }

      function getFeatureStepId(feature) {
        if (!feature || !feature.getProperty) {
          return NaN;
        }

        const stepId = Number(feature.getProperty("ifc_step_id"));
        return isFinite(stepId) ? stepId : NaN;
      }

      function findItemGroupByStepId(stepId) {
        return appState.itemGroups.find(function (group) {
          return group.stepIds.some(function (groupStepId) {
            return Number(groupStepId) === stepId;
          });
        }) || null;
      }

      function scrollFocusedItemGroupIntoView(groupKey) {
        window.setTimeout(function () {
          const row = Array.from(itemList.querySelectorAll(".item-row")).find(function (itemRow) {
            return itemRow.dataset.groupKey === groupKey;
          });
          if (!row) {
            return;
          }

          row.scrollIntoView({ block: "center", inline: "nearest" });
          if (row.focus) {
            try {
              row.focus({ preventScroll: true });
            } catch (error) {
              row.focus();
            }
          }
        }, 0);
      }

      function locateItemGroup(groupKey) {
        const group = appState.itemGroups.find(function (item) {
          return item.key === groupKey;
        });

        if (!group || !group.location) {
          status.textContent = "這個項目沒有可用定位資訊";
          return;
        }

        appState.locatedGroupKey = group.key;
        renderItemGroups({ preserveScroll: true });

        const location = group.location;
        const center = location.center;
        const focusPosition = Cesium.Cartesian3.fromDegrees(center.lon, center.lat, center.height);
        const markerPosition = Cesium.Cartesian3.fromDegrees(
          center.lon,
          center.lat,
          getItemLocationMarkerHeight(location)
        );
        const range = Math.max(location.range, 80);
        const sphere = new Cesium.BoundingSphere(focusPosition, Math.max(range * 0.2, 12));

        showItemLocationHint(group, markerPosition);
        viewer.camera.flyToBoundingSphere(sphere, {
          duration: 0.8,
          offset: new Cesium.HeadingPitchRange(
            Cesium.Math.toRadians(20),
            Cesium.Math.toRadians(-52),
            range
          )
        });
        status.textContent = "定位：" + group.displayName + " · " + formatWgs84Center(center);
        measureResult.textContent = "定位：" + group.displayName;
        viewer.scene.requestRender();
      }

      function showItemLocationHint(group, position) {
        if (appState.itemLocationEntity) {
          viewer.entities.remove(appState.itemLocationEntity);
        }

        appState.itemLocationEntity = viewer.entities.add({
          name: "定位：" + group.displayName,
          position: position,
          point: {
            pixelSize: 12,
            color: Cesium.Color.fromCssColorString("#22d3ee"),
            outlineColor: Cesium.Color.WHITE,
            outlineWidth: 2,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
          },
          label: {
            text: "定位：" + shortenItemLabel(group.displayName),
            font: "14px Microsoft JhengHei, sans-serif",
            fillColor: Cesium.Color.WHITE,
            showBackground: true,
            backgroundColor: Cesium.Color.fromCssColorString("#0e7490").withAlpha(0.9),
            pixelOffset: new Cesium.Cartesian2(0, -30),
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
          }
        });
      }

      function getItemLocationMarkerHeight(location) {
        return Math.max(location.center.height, location.max.height, 0) + 8;
      }

      function getLocationRangeMeters(location) {
        const latRadians = Cesium.Math.toRadians((location.min.lat + location.max.lat) * 0.5);
        const lonMeters = Math.abs(location.max.lon - location.min.lon) * 111320 * Math.max(0.1, Math.cos(latRadians));
        const latMeters = Math.abs(location.max.lat - location.min.lat) * 110540;
        const heightMeters = Math.abs(location.max.height - location.min.height);
        return Math.max(80, Math.min(5000, Math.max(lonMeters, latMeters, heightMeters) * 4 + 60));
      }

      function formatWgs84Center(center) {
        return center.lon.toFixed(6) + ", " + center.lat.toFixed(6);
      }

      function shortenItemLabel(value) {
        const text = String(value || "項目");
        return text.length > 28 ? text.slice(0, 27) + "..." : text;
      }

      function applyItemMaterialHighlights(options) {
        if (hasLocalMaterialHighlights()) {
          showHighlightedOverlayForCurrentMode().catch(function (error) {
            console.warn("highlight overlay unavailable", error);
            applyBaseTilesetStyle();
          });
        } else {
          hideHighlightedOverlays();
          applyBaseTilesetStyle();
        }

        if (!options || !options.silent) {
          const count = appState.highlightedGroupKeys.size;
          status.textContent = count ? "局部高反光：" + count + " 組" : "局部高反光已清除";
        }
        viewer.scene.requestRender();
      }

      function applyRenderScale(value) {
        const scale = Math.min(1, Math.max(0.5, Number(value) || 0.5));
        appState.renderScaleTarget = scale;
        renderScaleSlider.value = scale.toFixed(2);
        if (appState.autoRenderScaleEnabled && appState.cameraMoving) {
          setActiveRenderScale(AUTO_RENDER_SCALE_MOVING);
        } else if (appState.autoRenderScaleEnabled) {
          setActiveRenderScale(AUTO_RENDER_SCALE_RESTORED);
        } else {
          setActiveRenderScale(scale);
        }
      }

      function setActiveRenderScale(scale) {
        const nextScale = Math.min(1, Math.max(0.5, Number(scale) || 0.5));
        appState.renderScale = nextScale;
        viewer.resolutionScale = nextScale;
        renderScaleSlider.value = nextScale.toFixed(2);
        renderScaleValue.textContent = Math.round(nextScale * 100) + "%";
        if (appState.debugRenderScale) {
          console.log("Cesium resolutionScale", viewer.resolutionScale);
        }
        viewer.scene.requestRender();
      }

      function setAutoRenderScaleEnabled(enabled) {
        appState.autoRenderScaleEnabled = enabled;
        autoRenderScaleToggle.checked = enabled;
        if (!enabled) {
          window.clearTimeout(appState.renderScaleRestoreTimer);
          setActiveRenderScale(appState.renderScaleTarget);
        } else if (appState.cameraMoving) {
          lowerRenderScaleDuringMove();
        } else {
          restoreRenderScaleAfterMove();
        }
      }

      function configureAutoRenderScale(viewer) {
        viewer.camera.moveStart.addEventListener(lowerRenderScaleDuringMove);
        viewer.camera.moveEnd.addEventListener(restoreRenderScaleAfterMove);
        bindAutoRenderScaleInteractionFallback(viewer.scene.canvas);
      }

      function configureCloseViewDepthGuard(viewer) {
        viewer.camera.changed.addEventListener(updateCloseViewDepthGuard);
        viewer.camera.moveEnd.addEventListener(updateCloseViewDepthGuard);
        viewer.scene.postRender.addEventListener(function () {
          updateCloseViewDepthGuard();
        });
      }

      function updateCloseViewDepthGuard() {
        if (!viewer || !appState.isGlbTilesOutput || !appState.closeViewDepthGuard || appState.undergroundEnabled) {
          setCloseViewDepthGuardActive(false);
          return;
        }
        const sphere = appState.primaryBoundingSphere || (appState.tileset ? getPrimaryBoundingSphere(appState.tileset) : null);
        if (!sphere || !Cesium.defined(sphere.center) || !isFinite(sphere.radius)) {
          setCloseViewDepthGuardActive(false);
          return;
        }
        const cameraPosition = viewer.camera.positionWC || viewer.camera.position;
        const distanceToSurface = Cesium.Cartesian3.distance(cameraPosition, sphere.center) - sphere.radius;
        const threshold = Math.max(GLB_CLOSE_VIEW_MIN_DISTANCE, sphere.radius * GLB_CLOSE_VIEW_DEPTH_FACTOR);
        setCloseViewDepthGuardActive(distanceToSurface < threshold);
      }

      function setCloseViewDepthGuardActive(active) {
        if (appState.closeViewDepthGuardActive === active) {
          return;
        }
        appState.closeViewDepthGuardActive = active;
        applyTerrainDepthPolicy(false);
      }

      function bindAutoRenderScaleInteractionFallback(canvas) {
        canvas.addEventListener("pointermove", function (event) {
          if (event.buttons !== 0) {
            lowerRenderScaleDuringMove();
          }
        }, { passive: true });
        window.addEventListener("pointerup", restoreRenderScaleAfterMove, { passive: true });
        canvas.addEventListener("mousemove", function (event) {
          if (event.buttons !== 0) {
            lowerRenderScaleDuringMove();
          }
        }, { passive: true });
        window.addEventListener("mouseup", restoreRenderScaleAfterMove, { passive: true });
        canvas.addEventListener("wheel", function () {
          lowerRenderScaleDuringMove();
          restoreRenderScaleAfterMove();
        }, { passive: true });
      }

      function lowerRenderScaleDuringMove() {
        appState.cameraMoving = true;
        window.clearTimeout(appState.renderScaleRestoreTimer);
        if (appState.autoRenderScaleEnabled) {
          setActiveRenderScale(AUTO_RENDER_SCALE_MOVING);
        }
      }

      function restoreRenderScaleAfterMove() {
        appState.cameraMoving = false;
        window.clearTimeout(appState.renderScaleRestoreTimer);
        if (!appState.autoRenderScaleEnabled) {
          setActiveRenderScale(appState.renderScaleTarget);
          return;
        }
        appState.renderScaleRestoreTimer = window.setTimeout(function () {
          if (!appState.cameraMoving) {
            setActiveRenderScale(AUTO_RENDER_SCALE_RESTORED);
          }
        }, 160);
      }

      function handleMovePadPointer(event) {
        const rect = movePad.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const dx = event.clientX - centerX;
        const dy = centerY - event.clientY;
        const distance = Math.sqrt(dx * dx + dy * dy);

        event.preventDefault();
        if (distance < 10) {
          moveOutSlider.value = "0";
          applyMoveOut(0);
          return;
        }

        setMoveDirection(getMoveDirectionFromVector(dx, dy));
      }

      function getMoveDirectionFromVector(dx, dy) {
        const angle = Math.atan2(dy, dx);
        const octant = Math.round(angle / (Math.PI / 4));
        const directions = ["e", "ne", "n", "nw", "w", "sw", "s", "se"];
        return directions[(octant + 8) % 8];
      }

      function setMoveDirection(direction) {
        if (!moveDirections[direction]) {
          return;
        }

        appState.moveOutDirection = direction;
        appState.moveOutVector = moveDirections[direction];
        movePad.querySelectorAll("[data-move-direction]").forEach(function (button) {
          const active = button.getAttribute("data-move-direction") === direction;
          button.classList.toggle("active", active);
          button.setAttribute("aria-pressed", active ? "true" : "false");
        });

        applySelectedMoveOut(Number(moveOutSlider.value) / 100);
        updateSelectionStatus();
        viewer.scene.requestRender();
      }

      function getTilesetUrlForMode(mode) {
        return (normalModes.find(function (item) {
          return item.mode === mode;
        }) || normalModes[0]).url;
      }

      function getNormalModeLabel(mode) {
        return (normalModes.find(function (item) {
          return item.mode === mode;
        }) || normalModes[0]).label;
      }

      function syncNormalModeUi(mode) {
        const index = normalModes.findIndex(function (item) {
          return item.mode === mode;
        });
        normalModeSlider.value = String(Math.max(index, 0));
        normalModeValue.textContent = getNormalModeLabel(mode);
      }

      function getQueryFlag(name, defaultValue) {
        const value = query.get(name);
        if (value === null) {
          return defaultValue;
        }
        return !["0", "false", "off", "no"].includes(value.toLowerCase());
      }

      function getInitialTimeMinutes(configValue) {
        const value = configValue == null || configValue === "" ? query.get("time") : configValue;
        if (String(value || "").trim().toLowerCase() === "auto") {
          const now = new Date();
          return now.getHours() * 60 + now.getMinutes();
        }
        const match = /^(\d{1,2}):(\d{2})$/.exec(value || "");
        if (match) {
          const hours = Math.min(23, Math.max(0, Number(match[1]) || 0));
          const minutes = Math.min(59, Math.max(0, Number(match[2]) || 0));
          return hours * 60 + minutes;
        }
        const numeric = Number(value);
        if (Number.isFinite(numeric)) {
          return Math.min(1439, Math.max(0, Math.round(numeric)));
        }

        const now = new Date();
        return now.getHours() * 60 + now.getMinutes();
      }

      function formatTimeMinutes(value) {
        const minutes = Math.min(1439, Math.max(0, Math.round(Number(value) || 0)));
        const hoursText = String(Math.floor(minutes / 60)).padStart(2, "0");
        const minutesText = String(minutes % 60).padStart(2, "0");
        return hoursText + ":" + minutesText;
      }

      function syncTimeOfDayUi(value) {
        const minutes = Math.min(1439, Math.max(0, Math.round(Number(value) || 0)));
        timeOfDaySlider.value = String(minutes);
        timeOfDayValue.textContent = formatTimeMinutes(minutes);
      }

      function applyTimeOfDay(value, options) {
        const minutes = Math.min(1439, Math.max(0, Math.round(Number(value) || 0)));
        const date = new Date();
        date.setHours(Math.floor(minutes / 60), minutes % 60, 0, 0);
        appState.timeMinutes = minutes;
        viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);
        viewer.clock.shouldAnimate = false;
        syncTimeOfDayUi(minutes);
        applyNightDimming(minutes);

        if (!options || !options.silent) {
          status.textContent = "時間：" + formatTimeMinutes(minutes);
        }
        viewer.scene.requestRender();
      }

      function applyNightDimming(minutes) {
        const nightFactor = getNightFactor(minutes);
        appState.nightFactor = nightFactor;
        nightDimmer.style.setProperty("--night-dim-opacity", (nightFactor * 0.58).toFixed(3));
        configureMaterialLighting(viewer);
      }

      function getNightFactor(minutes) {
        if (minutes < 330) {
          return 1;
        }
        if (minutes < 420) {
          return 1 - ((minutes - 330) / 90);
        }
        if (minutes < 1020) {
          return 0;
        }
        if (minutes < 1140) {
          return (minutes - 1020) / 120;
        }
        return 1;
      }

      function getDaylightIntensity(baseIntensity) {
        const nightFactor = Math.min(1, Math.max(0, Number(appState.nightFactor) || 0));
        return Math.max(0.35, baseIntensity * (1 - nightFactor * 0.78));
      }

      function getMaterialConfig(mode) {
        const key = materialModes[mode] ? mode : "original";
        return Object.assign({ id: key }, materialModes[key]);
      }

      function syncMaterialModeUi(mode) {
        materialSelect.value = getMaterialConfig(mode).id;
      }

      function syncEnvironmentToggleUi() {
        atmosphereToggle.checked = appState.atmosphereEnabled;
        sunToggle.checked = appState.sunEnabled;
        shadowToggle.checked = appState.shadowEnabled;
        waterToggle.checked = appState.waterEnabled;
      }

      function configureMaterialLighting(viewer) {
        viewer.scene.highDynamicRange = true;

        if (Cesium.Tonemapper && viewer.scene.postProcessStages) {
          const tonemapper = getCesiumTonemapper(appState.cesiumToneMapping);
          if (tonemapper != null) {
            viewer.scene.postProcessStages.tonemapper = tonemapper;
          }
        }

        if (appState.sunEnabled && Cesium.SunLight) {
          viewer.scene.light = new Cesium.SunLight({
            color: Cesium.Color.WHITE,
            intensity: getDaylightIntensity(appState.cesiumLightIntensity)
          });
          return;
        }

        if (appState.cesiumCameraFillLight && Cesium.DirectionalLight) {
          viewer.scene.light = new Cesium.DirectionalLight({
            direction: getCameraLightDirection(viewer),
            color: Cesium.Color.WHITE,
            intensity: appState.cesiumCameraFillLightIntensity
          });
          bindCameraFillLight(viewer);
          return;
        }

        if (Cesium.DirectionalLight) {
          viewer.scene.light = new Cesium.DirectionalLight({
            direction: Cesium.Cartesian3.normalize(
              new Cesium.Cartesian3(-0.35, -0.55, -0.76),
              new Cesium.Cartesian3()
            ),
            color: Cesium.Color.WHITE,
            intensity: getDaylightIntensity(appState.cesiumLightIntensity)
          });
        }
      }

      function getCameraLightDirection(viewer) {
        const direction = Cesium.Cartesian3.clone(
          viewer.camera.directionWC || viewer.camera.direction,
          new Cesium.Cartesian3()
        );
        return Cesium.Cartesian3.normalize(direction, direction);
      }

      function bindCameraFillLight(viewer) {
        if (appState.cameraFillLightBound) {
          updateCameraFillLight(viewer);
          return;
        }
        appState.cameraFillLightBound = true;
        viewer.scene.preRender.addEventListener(function () {
          updateCameraFillLight(viewer);
        });
        updateCameraFillLight(viewer);
      }

      function updateCameraFillLight(viewer) {
        if (!appState.cesiumCameraFillLight || appState.sunEnabled || !viewer.scene.light || !Cesium.DirectionalLight) {
          return;
        }
        const direction = getCameraLightDirection(viewer);
        viewer.scene.light.direction = direction;
        viewer.scene.light.intensity = appState.cesiumCameraFillLightIntensity;
      }

      function setWaterAnimationEnabled(enabled) {
        if (enabled && !appState.waterRenderTimer) {
          appState.waterRenderTimer = window.setInterval(function () {
            viewer.scene.requestRender();
          }, 33);
          return;
        }

        if (!enabled && appState.waterRenderTimer) {
          window.clearInterval(appState.waterRenderTimer);
          appState.waterRenderTimer = null;
        }
      }

      function getShadowMode() {
        return appState.shadowEnabled ? Cesium.ShadowMode.ENABLED : Cesium.ShadowMode.DISABLED;
      }

      function applyShadowModeToTileset(tileset) {
        if (tileset && Cesium.ShadowMode) {
          tileset.shadows = getShadowMode();
        }
      }

      function applyEnvironmentToggles(options) {
        syncEnvironmentToggleUi();
        configureMaterialLighting(viewer);

        if (viewer.scene.skyAtmosphere) {
          viewer.scene.skyAtmosphere.show = appState.atmosphereEnabled;
        }
        if (viewer.scene.sun) {
          viewer.scene.sun.show = appState.sunEnabled;
        }
        if (viewer.scene.moon) {
          viewer.scene.moon.show = false;
        }
        if (viewer.scene.globe) {
          viewer.scene.globe.enableLighting = appState.sunEnabled;
          viewer.scene.globe.shadows = appState.shadowEnabled ? Cesium.ShadowMode.RECEIVE_ONLY : Cesium.ShadowMode.DISABLED;
        }

        viewer.shadows = appState.shadowEnabled;
        if (viewer.scene.shadowMap) {
          viewer.scene.shadowMap.softShadows = true;
          viewer.scene.shadowMap.darkness = appState.cesiumShadowDarkness;
        }

        Object.keys(appState.tilesets).forEach(function (key) {
          applyShadowModeToTileset(appState.tilesets[key]);
        });
        Object.keys(appState.selectedTilesets).forEach(function (key) {
          applyShadowModeToTileset(appState.selectedTilesets[key]);
        });
        Object.keys(appState.highlightTilesets).forEach(function (key) {
          applyShadowModeToTileset(appState.highlightTilesets[key]);
        });

        if (appState.waterPrimitive) {
          appState.waterPrimitive.show = appState.waterEnabled;
        }
        setWaterAnimationEnabled(appState.waterEnabled);

        if (!options || !options.silent) {
          status.textContent = "環境：" +
            (appState.atmosphereEnabled ? "大氣 " : "") +
            (appState.sunEnabled ? "太陽 " : "") +
            (appState.shadowEnabled ? "陰影 " : "") +
            (appState.waterEnabled ? "水波" : "");
        }
        viewer.scene.requestRender();
      }

      function createWaterSurfaceForTileset(tileset) {
        if (appState.waterPrimitive || !tileset || !tileset.boundingSphere || !Cesium.Material || !Cesium.Material.WaterType) {
          return appState.waterPrimitive;
        }

        const center = Cesium.Cartographic.fromCartesian(tileset.boundingSphere.center);
        const halfSpanMeters = Math.min(Math.max(tileset.boundingSphere.radius * 1.35, 2500), 12000);
        const ellipsoidRadius = Cesium.Ellipsoid.WGS84.maximumRadius;
        const latitudeDelta = halfSpanMeters / ellipsoidRadius;
        const longitudeDelta = halfSpanMeters / (ellipsoidRadius * Math.max(Math.cos(center.latitude), 0.2));
        const rectangle = new Cesium.Rectangle(
          center.longitude - longitudeDelta,
          Math.max(center.latitude - latitudeDelta, -Cesium.Math.PI_OVER_TWO + 0.0001),
          center.longitude + longitudeDelta,
          Math.min(center.latitude + latitudeDelta, Cesium.Math.PI_OVER_TWO - 0.0001)
        );

        const waterMaterial = new Cesium.Material({
          fabric: {
            type: Cesium.Material.WaterType,
            uniforms: {
              normalMap: waterNormalMapUrl,
              specularMap: Cesium.Material.DefaultImageId,
              baseWaterColor: Cesium.Color.fromCssColorString("#1f6f91").withAlpha(0.58),
              blendColor: Cesium.Color.fromCssColorString("#7dd3fc").withAlpha(0.42),
              frequency: 900.0,
              animationSpeed: 0.025,
              amplitude: 2.6,
              specularIntensity: 0.78,
              fadeFactor: 1.0
            }
          }
        });

        appState.waterPrimitive = viewer.scene.primitives.add(new Cesium.Primitive({
          geometryInstances: new Cesium.GeometryInstance({
            geometry: new Cesium.RectangleGeometry({
              rectangle: rectangle,
              height: 0.15,
              vertexFormat: Cesium.EllipsoidSurfaceAppearance.VERTEX_FORMAT
            })
          }),
          appearance: new Cesium.EllipsoidSurfaceAppearance({
            material: waterMaterial,
            aboveGround: true
          }),
          asynchronous: false,
          allowPicking: false,
          show: appState.waterEnabled
        }));
        appState.waterPrimitive.shadows = Cesium.ShadowMode.DISABLED;
        window.waterPrimitive = appState.waterPrimitive;
        return appState.waterPrimitive;
      }

      function hasLocalMaterialHighlights() {
        return appState.highlightedStepIds && appState.highlightedStepIds.size > 0;
      }

      function formatShaderNumber(value) {
        return Number(value || 0).toFixed(4);
      }

      function buildLocalHighlightTest() {
        return [
          "    bool localMirror = false;"
        ];
      }

      function createMaterialShader(config) {
        const localConfig = materialModes.mirror;
        const localTint = "vec3(" +
          formatShaderNumber(localConfig.tint[0]) + ", " +
          formatShaderNumber(localConfig.tint[1]) + ", " +
          formatShaderNumber(localConfig.tint[2]) + ")";

        return new Cesium.CustomShader({
          mode: Cesium.CustomShaderMode.MODIFY_MATERIAL,
          lightingModel: Cesium.LightingModel.PBR,
          uniforms: {
            u_metallicStrength: {
              type: Cesium.UniformType.FLOAT,
              value: config.metallic
            },
            u_roughness: {
              type: Cesium.UniformType.FLOAT,
              value: config.roughness
            },
            u_tintColor: {
              type: Cesium.UniformType.VEC3,
              value: new Cesium.Cartesian3(config.tint[0], config.tint[1], config.tint[2])
            },
            u_tintStrength: {
              type: Cesium.UniformType.FLOAT,
              value: config.tintStrength
            },
            u_brightness: {
              type: Cesium.UniformType.FLOAT,
              value: config.brightness
            },
            u_contrast: {
              type: Cesium.UniformType.FLOAT,
              value: config.contrast
            },
            u_specularBoost: {
              type: Cesium.UniformType.FLOAT,
              value: config.specularBoost
            },
            u_reflectionBoost: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumReflectionBoost
            },
            u_reflectionRoughness: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumReflectionRoughness
            },
            u_displayBrightness: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumDisplayBrightness
            },
            u_displayContrast: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumDisplayContrast
            },
            u_ambientFill: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumAmbientFill
            },
            u_shadowLift: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumShadowLift
            }
          },
          fragmentShaderText: [
            "void fragmentMain(FragmentInput fsInput, inout czm_modelMaterial material)",
            "{",
          ].concat(buildLocalHighlightTest()).concat([
            "    float metallicStrength = localMirror ? " + formatShaderNumber(localConfig.metallic) + " : u_metallicStrength;",
            "    float roughness = localMirror ? " + formatShaderNumber(localConfig.roughness) + " : u_roughness;",
            "    float tintStrength = localMirror ? " + formatShaderNumber(localConfig.tintStrength) + " : u_tintStrength;",
            "    float brightness = localMirror ? " + formatShaderNumber(localConfig.brightness) + " : u_brightness;",
            "    float contrast = localMirror ? " + formatShaderNumber(localConfig.contrast) + " : u_contrast;",
            "    float specularBoost = localMirror ? " + formatShaderNumber(localConfig.specularBoost) + " : u_specularBoost;",
            "    vec3 tintColor = localMirror ? " + localTint + " : u_tintColor;",
            "    vec3 originalDiffuse = max(material.diffuse, vec3(0.02));",
            "    vec3 tintedColor = mix(originalDiffuse, tintColor, tintStrength);",
            "    tintedColor = clamp((tintedColor - vec3(0.5)) * contrast + vec3(0.5), vec3(0.0), vec3(1.0));",
            "    tintedColor = clamp((tintedColor - vec3(0.5)) * u_displayContrast + vec3(0.5 + u_displayBrightness), vec3(0.0), vec3(1.0));",
            "    float shadowMask = smoothstep(0.20, 0.85, 1.0 - dot(tintedColor, vec3(0.299, 0.587, 0.114)));",
            "    tintedColor = mix(tintedColor, vec3(1.0), u_shadowLift * shadowMask);",
            "    vec3 metallicDiffuse = tintedColor * max(0.02, 1.0 - metallicStrength);",
            "    material.baseColor.rgb = mix(material.baseColor.rgb, tintedColor, tintStrength);",
            "    material.diffuse = mix(originalDiffuse, metallicDiffuse, metallicStrength);",
            "    material.specular = mix(material.specular, tintedColor * specularBoost, metallicStrength);",
            "    material.specular = max(material.specular, tintedColor * u_reflectionBoost);",
            "    material.roughness = clamp(mix(material.roughness, roughness, metallicStrength), 0.02, 1.0);",
            "    material.roughness = min(material.roughness, u_reflectionRoughness);",
            "    material.emissive += tintedColor * (brightness + u_displayBrightness * 0.35 + u_ambientFill);",
            "}"
          ]).join("\n")
        });
      }

      function createDisplayBoostShader() {
        return new Cesium.CustomShader({
          mode: Cesium.CustomShaderMode.MODIFY_MATERIAL,
          lightingModel: Cesium.LightingModel.PBR,
          uniforms: {
            u_displayBrightness: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumDisplayBrightness
            },
            u_displayContrast: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumDisplayContrast
            },
            u_reflectionBoost: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumReflectionBoost
            },
            u_reflectionRoughness: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumReflectionRoughness
            },
            u_ambientFill: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumAmbientFill
            },
            u_shadowLift: {
              type: Cesium.UniformType.FLOAT,
              value: appState.cesiumShadowLift
            }
          },
          fragmentShaderText: [
            "void fragmentMain(FragmentInput fsInput, inout czm_modelMaterial material)",
            "{",
            "    vec3 baseColor = max(material.baseColor.rgb, vec3(0.02));",
            "    vec3 diffuseColor = max(material.diffuse, vec3(0.02));",
            "    baseColor = clamp((baseColor - vec3(0.5)) * u_displayContrast + vec3(0.5 + u_displayBrightness), vec3(0.0), vec3(1.0));",
            "    diffuseColor = clamp((diffuseColor - vec3(0.5)) * u_displayContrast + vec3(0.5 + u_displayBrightness), vec3(0.0), vec3(1.0));",
            "    float baseShadowMask = smoothstep(0.20, 0.85, 1.0 - dot(baseColor, vec3(0.299, 0.587, 0.114)));",
            "    float diffuseShadowMask = smoothstep(0.20, 0.85, 1.0 - dot(diffuseColor, vec3(0.299, 0.587, 0.114)));",
            "    baseColor = mix(baseColor, vec3(1.0), u_shadowLift * baseShadowMask);",
            "    diffuseColor = mix(diffuseColor, vec3(1.0), u_shadowLift * diffuseShadowMask);",
            "    material.baseColor.rgb = baseColor;",
            "    material.diffuse = diffuseColor;",
            "    material.specular = max(material.specular, baseColor * u_reflectionBoost);",
            "    material.roughness = min(material.roughness, u_reflectionRoughness);",
            "    material.emissive += baseColor * (u_displayBrightness * 0.45 + u_ambientFill);",
            "}"
          ].join("\n")
        });
      }

      function applyMaterialShaderToTileset(mode, tileset) {
        if (!tileset || !Cesium.CustomShader || !Cesium.UniformType || !Cesium.CustomShaderMode || !Cesium.LightingModel) {
          return;
        }

        const config = getMaterialConfig(appState.materialMode);
        if (config.id === "original") {
          if (
            appState.cesiumDisplayBrightness <= 0 &&
            Math.abs(appState.cesiumDisplayContrast - 1.0) < 0.001 &&
            appState.cesiumShadowLift <= 0 &&
            appState.cesiumAmbientFill <= 0 &&
            appState.cesiumReflectionBoost <= 0
          ) {
            tileset.customShader = undefined;
            appState.materialShaders[mode] = null;
            return;
          }
          try {
            const shader = createDisplayBoostShader();
            tileset.customShader = shader;
            appState.materialShaders[mode] = shader;
          } catch (error) {
            console.warn("display boost CustomShader unavailable", error);
            tileset.customShader = undefined;
            appState.materialShaders[mode] = null;
          }
          return;
        }

        try {
          const shader = createMaterialShader(config);
          tileset.customShader = shader;
          appState.materialShaders[mode] = shader;
        } catch (error) {
          console.warn("material CustomShader unavailable", error);
          tileset.customShader = undefined;
          appState.materialShaders[mode] = null;
        }
      }

      function applyMaterialMode(mode, options) {
        const config = getMaterialConfig(mode);
        appState.materialMode = config.id;
        syncMaterialModeUi(config.id);
        configureMaterialLighting(viewer);

        Object.keys(appState.tilesets).forEach(function (key) {
          applyMaterialShaderToTileset(key, appState.tilesets[key]);
        });

        if (!options || !options.silent) {
          status.textContent = config.id === "original" ? "材質：原始" : "材質：" + config.label + "（PBR 金屬）";
        }
        viewer.scene.requestRender();
      }

      async function ensureMainTileset(mode) {
        if (appState.tilesets[mode]) {
          return appState.tilesets[mode];
        }
        if (appState.tilesetPromises[mode]) {
          return appState.tilesetPromises[mode];
        }

        status.textContent = "Loading 法線：" + getNormalModeLabel(mode) + "...";
        appState.tilesetPromises[mode] = Cesium.Cesium3DTileset.fromUrl(
          getTilesetUrlForMode(mode),
          buildTilesetOptions(false)
        ).then(function (tileset) {
          tileset.show = false;
          appState.tilesets[mode] = tileset;
          viewer.scene.primitives.add(tileset);
          applyTilesetRuntimeOptions(tileset, false);
          applyShadowModeToTileset(tileset);
          applyMaterialShaderToTileset(mode, tileset);
          return tileset;
        }).catch(function (error) {
          appState.tilesetPromises[mode] = null;
          status.textContent = "Tileset load failed: " + describeError(error);
          console.warn("tileset unavailable", mode, error);
          return null;
        });

        return appState.tilesetPromises[mode];
      }

      function buildTilesetOptions(selectedOverlay) {
        const options = {
          maximumScreenSpaceError: selectedOverlay ? 4 : 8,
          skipLevelOfDetail: false
        };
        if (!selectedOverlay) {
          options.enableDebugWireframe = true;
        }
        if (appState.isGlbTilesOutput) {
          options.maximumScreenSpaceError = 0;
          options.cullRequestsWhileMoving = false;
          options.cullWithChildrenBounds = false;
          options.dynamicScreenSpaceError = false;
          options.immediatelyLoadDesiredLevelOfDetail = true;
          options.loadSiblings = true;
          options.preloadFlightDestinations = true;
          options.preloadWhenHidden = true;
          options.cacheBytes = 1024 * 1024 * 1024;
          options.maximumCacheOverflowBytes = 1024 * 1024 * 1024;
        }
        return options;
      }

      function applyTilesetRuntimeOptions(tileset, selectedOverlay) {
        tileset.maximumScreenSpaceError = appState.isGlbTilesOutput ? 0 : (selectedOverlay ? 4 : 8);
        applyTilesetVisualPreset(tileset);
        if (!appState.isGlbTilesOutput) {
          return;
        }
        if ("cullRequestsWhileMoving" in tileset) {
          tileset.cullRequestsWhileMoving = false;
        }
        if ("cullWithChildrenBounds" in tileset) {
          tileset.cullWithChildrenBounds = false;
        }
        if ("dynamicScreenSpaceError" in tileset) {
          tileset.dynamicScreenSpaceError = false;
        }
        if ("preloadWhenHidden" in tileset) {
          tileset.preloadWhenHidden = true;
        }
      }

      function applyTilesetVisualPreset(tileset) {
        try {
          if (tileset.imageBasedLighting && "imageBasedLightingFactor" in tileset.imageBasedLighting) {
            tileset.imageBasedLighting.imageBasedLightingFactor = new Cesium.Cartesian2(
              appState.cesiumImageBasedLighting,
              appState.cesiumImageBasedLighting
            );
          }
        } catch (error) {
          console.warn("imageBasedLightingFactor unavailable", error);
        }
        try {
          if ("lightColor" in tileset) {
            tileset.lightColor = new Cesium.Cartesian3(
              appState.cesiumModelLightBoost,
              appState.cesiumModelLightBoost,
              appState.cesiumModelLightBoost
            );
          }
        } catch (error) {
          console.warn("tileset lightColor unavailable", error);
        }
      }

      async function setShadingMode(mode) {
        const previousMode = appState.shadingMode;
        syncNormalModeUi(mode);
        if (mode === appState.shadingMode) {
          return;
        }

        const nextTileset = await ensureMainTileset(mode);
        if (!nextTileset) {
          syncNormalModeUi(previousMode);
          return;
        }

        const selectedCondition = appState.selectedCondition;
        Object.keys(appState.tilesets).forEach(function (key) {
          if (appState.tilesets[key]) {
            appState.tilesets[key].show = key === mode;
          }
        });
        Object.keys(appState.selectedTilesets).forEach(function (key) {
          if (appState.selectedTilesets[key]) {
            appState.selectedTilesets[key].show = false;
          }
        });
        Object.keys(appState.highlightTilesets).forEach(function (key) {
          if (appState.highlightTilesets[key]) {
            appState.highlightTilesets[key].show = false;
          }
        });

        appState.shadingMode = mode;
        appState.tileset = nextTileset;
        appState.selectedTileset = appState.selectedTilesets[mode] || null;
        appState.selectedShader = appState.selectedShaders[mode] || null;
        appState.highlightTileset = appState.highlightTilesets[mode] || null;
        appState.primaryBoundingSphere = getPrimaryBoundingSphere(nextTileset);
        window.tileset = nextTileset;
        window.selectedTileset = appState.selectedTileset;
        window.highlightTileset = appState.highlightTileset;
        applyMaterialShaderToTileset(mode, nextTileset);
        applyEnvironmentToggles({ silent: true });
        appState.selectedCondition = selectedCondition || "";
        applyBaseTilesetStyle();

        if (selectedCondition) {
          setWireframeEnabled(appState.focusEnabled);
          await showSelectedOverlayForCondition(selectedCondition);
          updateSelectionStatus();
        } else {
          setWireframeEnabled(false);
        }
        if (hasLocalMaterialHighlights()) {
          showHighlightedOverlayForCurrentMode().catch(function (error) {
            console.warn("highlight overlay unavailable", error);
          });
        }

        status.textContent = "已切換法線：" + getNormalModeLabel(mode);
        updateCloseViewDepthGuard();
        viewer.scene.requestRender();
      }

      function setMode(mode) {
        appState.mode = mode;
        document.querySelectorAll("[data-mode]").forEach(function (button) {
          button.classList.toggle("active", button.getAttribute("data-mode") === mode);
        });

        clearMeasurement();
        clearFeatureSelection();

        if (mode === "distance") {
          measureResult.textContent = "量距：點選兩點以上，右鍵完成";
        } else if (mode === "area") {
          measureResult.textContent = "量面：點選三點以上，右鍵完成";
        } else {
          measureResult.textContent = "選取模式";
        }
      }

      function setFocusEnabled(enabled) {
        appState.focusEnabled = enabled;
        focusToggle.setAttribute("aria-pressed", enabled ? "true" : "false");
        focusToggle.textContent = enabled ? "焦點 ON" : "焦點 OFF";

        if (appState.selectedFeature) {
          applySelectionStyle(appState.selectedFeature);
          measureResult.textContent = enabled ? "焦點顯示開啟" : "焦點顯示關閉，選取、爆炸、移出仍可使用";
          return;
        }

        if (!enabled) {
          clearFocusDisplay();
          measureResult.textContent = "焦點顯示關閉，模型已全部還原";
          return;
        }

        measureResult.textContent = "焦點顯示開啟，請點選實體";
      }

      function setUndergroundEnabled(enabled, options) {
        appState.undergroundEnabled = enabled;
        undergroundToggle.setAttribute("aria-pressed", enabled ? "true" : "false");
        undergroundToggle.textContent = enabled ? "透地 ON" : "透地 OFF";
        updateCloseViewDepthGuard();
        applyTerrainDepthPolicy(!options || !options.silent);
      }

      function applyTerrainDepthPolicy(announce) {
        const guardActive = Boolean(appState.closeViewDepthGuardActive && !appState.undergroundEnabled);
        const depthBlocked = !appState.undergroundEnabled && !guardActive;
        const globe = viewer.scene.globe;
        globe.show = true;
        globe.translucency.enabled = false;
        globe.translucency.frontFaceAlpha = 1.0;
        globe.translucency.backFaceAlpha = 1.0;
        globe.depthTestAgainstTerrain = depthBlocked;
        viewer.scene.requestRender();
        if (announce) {
          if (appState.undergroundEnabled) {
            measureResult.textContent = "透地開啟，地面/水面不遮蔽模型";
          } else if (guardActive) {
            measureResult.textContent = "近距離瀏覽保護啟用，暫停地形深度遮蔽";
          } else {
            measureResult.textContent = "透地關閉，穿入地面/水面部分會被擋住";
          }
        }
      }

      async function handleFeatureSelection(position) {
        const picked = viewer.scene.pick(position);
        if (!Cesium.defined(picked) || !Cesium.defined(picked.getPropertyIds)) {
          clearFeatureSelection();
          return;
        }

        appState.selectedFeature = picked;
        appState.selectedKey = getFeatureKey(picked);
        showFeatureInfo(picked);
        await applySelectionStyle(picked);
        updateSelectionStatus();
        focusItemGroupForFeature(picked);
        viewer.scene.requestRender();
      }

      async function applySelectionStyle(feature) {
        const tileset = appState.tileset;
        if (!tileset) {
          return;
        }

        const condition = buildFeatureCondition(feature);
        if (!condition) {
          return;
        }

        appState.selectedCondition = condition;
        applyBaseTilesetStyle();
        setWireframeEnabled(appState.focusEnabled);

        await showSelectedOverlayForCondition(condition);
      }

      async function showSelectedOverlayForCondition(condition) {
        const selectedTileset = await ensureSelectedTileset();
        if (selectedTileset) {
          selectedTileset.show = true;
          selectedTileset.style = new Cesium.Cesium3DTileStyle(buildSelectedOverlayStyle(condition));
          applyBaseTilesetStyle();
          applySelectedExplosion(Number(explodeSlider.value) / 100);
          applySelectedMoveOut(Number(moveOutSlider.value) / 100);
        }
      }

      async function showHighlightedOverlayForCurrentMode() {
        const condition = buildHighlightedItemCondition();
        if (!condition) {
          document.body.dataset.highlightOverlay = "off";
          hideHighlightedOverlays();
          applyBaseTilesetStyle();
          return;
        }

        document.body.dataset.highlightOverlay = "loading";
        const highlightTileset = await ensureHighlightTileset();
        const currentCondition = buildHighlightedItemCondition();
        if (!highlightTileset || !currentCondition) {
          document.body.dataset.highlightOverlay = "off";
          return;
        }

        highlightTileset.show = true;
        highlightTileset.style = new Cesium.Cesium3DTileStyle(buildHighlightedOverlayStyle(currentCondition));
        appState.highlightTileset = highlightTileset;
        window.highlightTileset = highlightTileset;
        applyBaseTilesetStyle();
        document.body.dataset.highlightOverlay = "ready";
        status.textContent = "局部高反光：" + appState.highlightedGroupKeys.size + " 組（高亮材質）";
        viewer.scene.requestRender();
      }

      function hideHighlightedOverlays() {
        Object.keys(appState.highlightTilesets).forEach(function (mode) {
          const highlightTileset = appState.highlightTilesets[mode];
          if (!highlightTileset) {
            return;
          }
          highlightTileset.show = false;
          highlightTileset.style = undefined;
        });
        appState.highlightTileset = null;
        window.highlightTileset = null;
        document.body.dataset.highlightOverlay = "off";
      }

      function buildSelectedOverlayStyle(condition) {
        return {
          show: {
            conditions: [
              [condition, "true"],
              ["true", "false"]
            ]
          },
          color: "color('#fef08a', 1.0)"
        };
      }

      function buildHighlightedOverlayStyle(condition) {
        const conditions = [];
        if (appState.selectedCondition) {
          conditions.push([appState.selectedCondition, "false"]);
        }
        conditions.push([condition, "true"]);
        conditions.push(["true", "false"]);
        return {
          show: {
            conditions: conditions
          },
          color: "color('#facc15', 1.0)"
        };
      }

      function buildHighlightedItemCondition() {
        if (!hasLocalMaterialHighlights()) {
          return "";
        }
        return Array.from(appState.highlightedStepIds).sort(function (a, b) {
          return a - b;
        }).map(function (stepId) {
          return "${ifc_step_id} === " + Number(stepId);
        }).join(" || ");
      }

      function buildBaseTilesetStyle() {
        const style = {};
        const hiddenConditions = [];
        const highlightedCondition = buildHighlightedItemCondition();
        if (appState.selectedCondition) {
          hiddenConditions.push([appState.selectedCondition, "false"]);
        }
        if (highlightedCondition) {
          hiddenConditions.push([highlightedCondition, "false"]);
        }
        if (hiddenConditions.length) {
          hiddenConditions.push(["true", "true"]);
          style.show = {
            conditions: hiddenConditions
          };
        }
        if (appState.focusEnabled) {
          style.color = "color('#94a3b8', 0.16)";
        }
        return Object.keys(style).length ? style : null;
      }

      function applyBaseTilesetStyle() {
        const style = buildBaseTilesetStyle();
        Object.keys(appState.tilesets).forEach(function (mode) {
          const tileset = appState.tilesets[mode];
          if (!tileset) {
            return;
          }
          tileset.style = style ? new Cesium.Cesium3DTileStyle(style) : undefined;
        });
      }

      function updateSelectionStatus() {
        if (!appState.selectedCondition) {
          return;
        }
        const explodePercent = Math.round(Number(explodeSlider.value) || 0);
        const movePercent = Math.round(Number(moveOutSlider.value) || 0);
        const activeParts = [];
        if (explodePercent > 0) {
          activeParts.push("爆炸：" + explodePercent + "%");
        }
        if (movePercent > 0) {
          activeParts.push("移出：" + movePercent + "% " + appState.moveOutVector.label);
        }
        if (activeParts.length > 0) {
          measureResult.textContent = activeParts.join("，");
          return;
        }
        measureResult.textContent = appState.focusEnabled ? "已選取，焦點顯示中" : "已選取，焦點 OFF";
      }

      function clearFeatureSelection() {
        appState.selectedFeature = null;
        appState.selectedKey = null;
        appState.selectedCondition = "";
        appState.focusedGroupKey = null;
        renderItemGroups({ preserveScroll: true });
        viewer.selectedEntity = undefined;
        clearFocusDisplay();
        viewer.scene.requestRender();
      }

      function clearFocusDisplay() {
        appState.selectedCondition = "";
        setWireframeEnabled(false);
        Object.keys(appState.selectedTilesets).forEach(function (mode) {
          const selectedTileset = appState.selectedTilesets[mode];
          if (selectedTileset) {
            selectedTileset.show = false;
            selectedTileset.style = undefined;
            selectedTileset.maximumScreenSpaceError = 4;
          }
          if (appState.selectedShaders[mode]) {
            appState.selectedShaders[mode].setUniform("u_explodeDistance", 0.0);
            appState.selectedShaders[mode].setUniform("u_moveDistance", 0.0);
            appState.selectedShaders[mode].setUniform("u_moveDirectionX", appState.moveOutVector.x);
            appState.selectedShaders[mode].setUniform("u_moveDirectionY", appState.moveOutVector.y);
          }
        });
        appState.selectedTileset = appState.selectedTilesets[appState.shadingMode] || null;
        appState.selectedShader = appState.selectedShaders[appState.shadingMode] || null;
        window.selectedTileset = appState.selectedTileset;
        applyBaseTilesetStyle();
      }

      function setWireframeEnabled(enabled) {
        const tileset = appState.tileset;
        if (!tileset) {
          return;
        }
        try {
          if ("debugWireframe" in tileset) {
            tileset.debugWireframe = enabled;
          }
        } catch (error) {
          console.warn("debugWireframe unavailable", error);
        }
      }

      function showFeatureInfo(feature) {
        const propertyIds = feature.getPropertyIds();
        const rows = propertyIds
          .map(function (id) {
            const value = feature.getProperty(id);
            return "<tr><th>" + escapeHtml(id) + "</th><td>" + escapeHtml(formatValue(value)) + "</td></tr>";
          })
          .join("");

        viewer.selectedEntity = new Cesium.Entity({
          name: feature.getProperty("name") || feature.getProperty("global_id") || "IFC Feature",
          description: '<table class="feature-table"><tbody>' + rows + "</tbody></table>"
        });
      }

      function getFeatureKey(feature) {
        return feature.getProperty("global_id") ||
          feature.getProperty("ifc_step_id") ||
          feature.getProperty("batch_id") ||
          "";
      }

      function buildFeatureCondition(feature) {
        const globalId = feature.getProperty("global_id");
        if (globalId !== undefined && globalId !== null && String(globalId) !== "") {
          return "${global_id} === '" + escapeStyleString(String(globalId)) + "'";
        }

        const ifcStepId = feature.getProperty("ifc_step_id");
        if (ifcStepId !== undefined && ifcStepId !== null && String(ifcStepId) !== "") {
          if (isFinite(Number(ifcStepId))) {
            return "${ifc_step_id} === " + Number(ifcStepId);
          }
          return "${ifc_step_id} === '" + escapeStyleString(String(ifcStepId)) + "'";
        }

        const batchId = feature.getProperty("batch_id");
        if (batchId !== undefined && batchId !== null && isFinite(Number(batchId))) {
          return "${batch_id} === " + Number(batchId);
        }

        return "";
      }

      async function ensureHighlightTileset() {
        const mode = appState.shadingMode;
        if (appState.highlightTilesets[mode]) {
          appState.highlightTileset = appState.highlightTilesets[mode];
          window.highlightTileset = appState.highlightTileset;
          return appState.highlightTileset;
        }
        if (appState.highlightTilesetPromises[mode]) {
          return appState.highlightTilesetPromises[mode];
        }

        appState.highlightTilesetPromises[mode] = Cesium.Cesium3DTileset.fromUrl(
          getTilesetUrlForMode(mode),
          buildTilesetOptions(true)
        ).then(function (highlightTileset) {
          highlightTileset.show = false;
          applyTilesetRuntimeOptions(highlightTileset, true);
          installHighlightMaterialShader(highlightTileset, mode);
          appState.highlightTilesets[mode] = highlightTileset;
          if (mode === appState.shadingMode) {
            appState.highlightTileset = highlightTileset;
            window.highlightTileset = highlightTileset;
          }
          viewer.scene.primitives.add(highlightTileset);
          applyShadowModeToTileset(highlightTileset);
          return highlightTileset;
        }).catch(function (error) {
          console.warn("highlight overlay unavailable", error);
          appState.highlightTilesetPromises[mode] = null;
          return null;
        });

        return appState.highlightTilesetPromises[mode];
      }

      function installHighlightMaterialShader(tileset, mode) {
        if (!Cesium.CustomShader || !Cesium.UniformType) {

        }

        try {
          const shader = createMaterialShader(getMaterialConfig("mirror"));
          tileset.customShader = shader;

          tileset.customShader = undefined;

      async function ensureSelectedTileset() {
        const mode = appState.shadingMode;
        if (appState.selectedTilesets[mode]) {
          appState.selectedTileset = appState.selectedTilesets[mode];
          appState.selectedShader = appState.selectedShaders[mode] || null;
          window.selectedTileset = appState.selectedTileset;
